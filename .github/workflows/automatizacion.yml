name: 🤖 Automatización Diaria - Jelou Dashboard

# Ejecutar diariamente a las 6:00 AM hora de Bogotá (11:00 AM UTC)
on:
  schedule:
    - cron: '0 11 * * *'  # 6 AM en Bogotá = 11 AM UTC

  # Permitir ejecución manual desde GitHub Actions
  workflow_dispatch:

jobs:
  automatizacion:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Configurar Python
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Instalar dependencias
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl pandas -q
          echo "✅ Dependencias instaladas"

      # 4. Descargar datos de Jelou
      - name: 📥 Descargar datos de Jelou.ai
        run: |
          python jelou_downloader_headless.py
          echo "Descarga completada"
        continue-on-error: true

      # 5. Hacer commit de los archivos actualizados
      - name: 💾 Hacer commit de cambios
        run: |
          git config user.name "🤖 Jelou Automation Bot"
          git config user.email "automation@jelou.local"

          # Ver qué cambios hay
          git add -A

          # Verificar si hay cambios
          if git diff --quiet --cached; then
            echo "✅ No hay cambios para hacer commit"
          else
            git commit -m "🤖 Actualización automática de datos - $(date +'%Y-%m-%d %H:%M:%S UTC')"
            echo "✅ Cambios committed"
          fi

      # 6. Hacer push de los cambios
      - name: 🚀 Hacer push de cambios
        run: |
          git push origin $(git rev-parse --abbrev-ref HEAD) || echo "✅ Repositorio ya estaba actualizado"

      # 7. Generar reporte
      - name: 📊 Generar reporte
        if: always()
        run: |
          echo "## 📊 Reporte de Automatización" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fecha**: $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ Completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Archivos actualizados:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Canal Chat.xlsx" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Canal Correo.xlsx" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Chats AI Agent.xlsx" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CSAT AI Agent.xlsx" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CSAT Operadores.xlsx" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard actualizado automáticamente 🎉" >> $GITHUB_STEP_SUMMARY
